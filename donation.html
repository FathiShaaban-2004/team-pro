    <!-- Main -->
    <main class="page-wrapper">

        <div class="donation-container">

            <header class="page-header">
                <h1>
                    إضافة منتج للتبرع
                </h1>

                <p>
                    ساهم في إسعاد الآخرين من خلال
                    التبرع بأغراضك المستعملة
                    بحالة جيدة
                </p>
            </header>

            <form id="donationForm"
                  class="donation-card"
                  enctype="multipart/form-data">

                <div class="form-grid">

                    <!-- النوع -->
                    <div class="form-group">

                        <label for="category">
                            نوع المنتج
                        </label>

                        <select id="category"
                                name="type"
                                class="styled-select"
                                required>

                            <option value=""
                                    disabled
                                    selected>
                                اختر النوع...
                            </option>

                            <option value="man">
                                رجال
                            </option>

                            <option value="woman">
                                حريمي
                            </option>

                            <option value="child">
                                أطفال
                            </option>

                        </select>
                    </div>

                    <!-- المقاس -->
                    <div class="form-group">

                        <label for="size">
                            المقاس
                        </label>

                        <select id="size"
                                name="size"
                                class="styled-select"
                                required>

                            <option value=""
                                    disabled
                                    selected>
                                اختر المقاس...
                            </option>

                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>

                            <option value="Free">
                                مقاس حر
                            </option>

                        </select>
                    </div>

                    <!-- العدد -->
                    <div class="form-group">

                        <label>
                            العدد
                        </label>

                        <div class="quantity-wrapper">

                            <button type="button"
                                    class="qty-btn"
                                    onclick="updateQty(1)">
                                +
                            </button>

                            <input type="number"
                                   id="quantity"
                                   name="quantity"
                                   class="quantity-input"
                                   value="1"
                                   min="1"
                                   readonly />

                            <button type="button"
                                    class="qty-btn"
                                    onclick="updateQty(-1)">
                                -
                            </button>

                        </div>
                    </div>

                    <!-- الحالة -->
                    <div class="form-group full-width">

                        <label>
                            حالة المنتج
                        </label>

                        <div class="radio-grid">

                            <label class="radio-card">

                                <input type="radio"
                                       name="condition"
                                       value="جديدة"
                                       checked />

                                <div class="radio-card-content">
                                    <i class="fa-solid fa-star"
                                       style="margin-left:8px"></i>
                                    جديدة
                                </div>

                            </label>

                            <label class="radio-card">

                                <input type="radio"
                                       name="condition"
                                       value="ممتازة" />

                                <div class="radio-card-content">
                                    ممتازة
                                </div>

                            </label>

                            <label class="radio-card">

                                <input type="radio"
                                       name="condition"
                                       value="جيدة" />

                                <div class="radio-card-content">
                                    جيدة
                                </div>

                            </label>

                            <label class="radio-card">

                                <input type="radio"
                                       name="condition"
                                       value="مقبولة" />

                                <div class="radio-card-content">
                                    مقبولة
                                </div>

                            </label>

                        </div>
                    </div>

                    <!-- الصور -->
                    <div class="form-group full-width">

                        <label>
                            صور المنتج
                        </label>

                        <div class="upload-area"
                             id="dropZone">

                            <input type="file"
                                   id="fileInput"
                                   class="file-input-real"
                                   multiple
                                   accept="image/*" />

                            <div class="upload-content">

                                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

                                <div class="upload-text">
                                    انقر لرفع صورة
                                    أو اسحبها هنا
                                </div>

                                <div class="upload-hint">
                                    PNG, JPG حتى 5MB
                                </div>

                            </div>
                        </div>

                        <div class="preview-gallery"
                             id="previewGallery">
                        </div>
                    </div>

                    <!-- وصف -->
                    <div class="form-group full-width">

                        <label for="notes">
                            ملاحظات إضافية
                        </label>

                        <textarea id="notes"
                                  name="description"
                                  class="styled-input"
                                  rows="3"
                                  placeholder="اكتب تفاصيل إضافية..."></textarea>

                    </div>

                </div>

                <div class="form-actions">

                    <button type="button"
                            class="btn-cancel"
                            onclick="window.history.back()">
                        إلغاء
                    </button>

                    <button type="submit"
                            class="btn-submit">
                        تقديم التبرع
                    </button>

                </div>

            </form>

        </div>
