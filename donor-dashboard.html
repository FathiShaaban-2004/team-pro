        <link rel="stylesheet" href="css/all.css">
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="./css/donor.css">
    </head>

<body>

    <div class="my-dashboard">

            </a>

        </div>

        <!-- Logged In Actions -->
<div
    class="nav-actions"
    id="navActions">
</div>

        <!-- Hamburger -->
        <button class="nav-ham"
            id="hamBtn">

            <span></span>
            <span></span>
            <span></span>

        </button>

    </div>
</nav>

<!-- ══════ MOBILE MENU ══════ -->
<div class="mobile-nav"
    id="mobileNav">

    <a href="index.html">الرئيسية</a>

    <a href="charity.html">الجمعيات</a>

    <a href="ai-chat.html">المساعد الذكي</a>

    <a href="about.html">عن المنصة</a>

    <a href="contact.html">تواصل معنا</a>

    <a href="settings.html"
       class="nav-btn-login">

        ⚙️ الإعدادات

    </a>

    <button id="mobileLogoutBtn"
        class="nav-btn-signup"
        style="width:100%; margin-top:10px;">

        تسجيل خروج

    </button>

</div>

        <!-- Dashboard -->
        <div class="container py-5 mt-5">

            <div class="row justify-content-center mb-4">
                <div class="col-md-8 text-center">
                    <h3 class="fw-bold">
                        لوحة تحكم المتبرع
                    </h3>
                </div>
            </div>

            <div class="row justify-content-center g-4">

                <div class="col-md-9">

                    <!-- Donations Table -->
                    <div class="card shadow-sm border-0 p-4">

                        <h5 class="mb-4 fw-bold">
                            تبرعاتي السابقة
                        </h5>

                        <div class="table-responsive">

                            <table class="table align-middle text-center">

                                <thead>
                                    <tr>
                                        <th>التاريخ</th>
                                        <th>الحالة</th>
                                        <th>العدد</th>
                                        <th>المقاس</th>
                                        <th>النوع</th>
                                    </tr>
                                </thead>

                                <tbody id="userdonationsTable">
                                    <!-- Data From JS -->
                                </tbody>

                            </table>

                        </div>

                    </div>

                    <!-- Smart Widget -->
                    <div class="card shadow-sm p-4 mt-4 smart-widget">

                        <h5 class="mb-4 mx-2">
                            📊 حالة التبرعات في المنصة
                        </h5>

                        <!-- Trust Bar -->
                        <div class="mb-4 my-1">

                            <h6>
                                نسبة المتبرعين النشطين
                            </h6>

                            <div class="progress">

                                <div id="trustBar"
                                    class="progress-bar bg-success"
                                    style="width:0%">
                                    0%
                                </div>

                            </div>

                        </div>

                        <!-- Sizes -->
                        <div class="text-center mb-4">

                            <h6>
                                📏 المقاسات المتبرع بها
                            </h6>

                            <div id="sizesBox"
                                class="sizes-box mt-2">

                            </div>

                        </div>

                        <!-- Chart -->
                        <canvas id="donationChart"
                            style="margin-top:20px;">
                        </canvas>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="script/donor.js"></script>
    <script src="script/main.js"></script>
